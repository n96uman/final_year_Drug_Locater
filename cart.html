<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Drug Locator</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">Drug Locator</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="search.html">Search Medicine</a></li>
                <li><a href="pharmacies.html">Pharmacies</a></li>
                <li><a href="cart.html" class="active">Cart</a></li>
                <li><a href="login.html">Login/Register</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="cart-section">
            <h1>Your Cart</h1>
            <div class="cart-list">
                <div class="cart-item">
                    <div class="cart-info">
                        <h3>Paracetamol</h3>
                        <p>Pharmacy: HealthPlus</p>
                        <p>Price: 30 ETB</p>
                        <p>Quantity: 1</p>
                    </div>
                    <button class="remove-btn">Remove</button>
                </div>
                <div class="cart-item">
                    <div class="cart-info">
                        <h3>Amoxicillin</h3>
                        <p>Pharmacy: Medico</p>
                        <p>Price: 50 ETB</p>
                        <p>Quantity: 2</p>
                    </div>
                    <button class="remove-btn">Remove</button>
                </div>
            </div>
            <div class="cart-total">
                <p>Total: <span>130 ETB</span></p>
                <button class="checkout-btn">Checkout</button>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Drug Locator | E-Pharmacy System | Hawassa City</p>
    </footer>
</body>
</html>
